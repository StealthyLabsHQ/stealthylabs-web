<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog - StealthyLabs</title>
    <link rel="canonical" href="https://stealthylabs.eu/en/changelog">
    <link rel="alternate" hreflang="en" href="https://stealthylabs.eu/en/changelog">
    <link rel="alternate" hreflang="fr" href="https://stealthylabs.eu/fr/changelog">
    <script>
        (function() {
            function getCookie(name) {
                var value = '; ' + document.cookie;
                var parts = value.split('; ' + name + '=');
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            var lang = getCookie('userLang');
            if (!lang) {
                var nav = navigator.language || navigator.userLanguage || 'en';
                lang = nav.toLowerCase().startsWith('fr') ? 'fr' : 'en';
            }
            if (lang === 'fr') {
                window.location.replace('/fr/changelog');
            } else {
                window.location.replace('/en/changelog');
            }
        })();
    </script>
</head>
<body></body>
</html>
