<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealthyLabs</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stealthylabs.eu/">
    <meta property="og:site_name" content="StealthyLabs">
    <meta property="og:title" content="/stealthylabs">
    <meta property="og:description" content="access granted_ identity: stealthy status: observing">
    <meta property="og:image" content="https://stealthylabs.eu/logos/embed.png">
    <link rel="icon" type="image/png" href="logos/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;500;700&family=Raleway:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <meta name="site-root" content="">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            color: #E5E5E5;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            overflow: hidden;
        }

        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
            text-align: center;
            padding: 40px;
        }

        .splash-brand {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #E5E5E5;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.3s forwards;
        }

        .splash-line {
            width: 0;
            height: 1px;
            background: #A8D8EA;
            animation: expandLine 1s ease-out 0.9s forwards;
            max-width: 200px;
        }

        .splash-status {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #757575;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.4s forwards;
            font-family: 'JetBrains Mono', monospace;
        }

        .splash-countdown {
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.15em;
            color: #484848;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.8s forwards;
        }

        .splash-countdown span {
            color: #A8D8EA;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expandLine {
            from { width: 0; }
            to { width: 200px; }
        }
    </style>
</head>

<body>
    <div class="splash">
        <h1 class="splash-brand">StealthyLabs</h1>
        <div class="splash-line"></div>
        <p class="splash-status">redirecting...</p>
        <p class="splash-countdown" id="splashCountdown">[ <span id="countdownNum">4</span> ]</p>
    </div>

    <script src="js/cookie-utils.js"></script>
    <script>
        var countEl = document.getElementById('countdownNum');
        var count = 4;
        var interval = setInterval(function() {
            count--;
            if (countEl) countEl.textContent = count;
            if (count <= 0) clearInterval(interval);
        }, 1000);

        setTimeout(function() {
            var lang = getCookie('userLang') || (navigator.language && navigator.language.startsWith('fr') ? 'fr' : 'en');
            window.location.replace('/' + lang + '/network');
        }, 4500);
    </script>
</body>

</html>
